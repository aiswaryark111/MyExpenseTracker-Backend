service: expenseiq-backend

useDotenv: true

package:
  individually: false
  excludeDevDependencies: true
  patterns:
    - '!node_modules/.cache/**'
    - '!node_modules/**/test/**'
    - '!node_modules/**/tests/**'
    - '!node_modules/**/*.md'
    - '!node_modules/**/*.ts'
    - '!node_modules/**/es/**'
    - '!src/**'
    - '!test/**'
    - '!**/*.map'
    - 'dist/**'

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-west-1
  memorySize: 512
  timeout: 30
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource: arn:aws:s3:::expenseiq-receipts/*
        - Effect: Allow
          Action:
            - ssm:GetParameter
            - ssm:GetParameters
            - ssm:GetParametersByPath
          Resource: arn:aws:ssm:eu-west-1:*:parameter/expenseiq/prod/*
  environment:
    NODE_ENV: production
    AWS_RECEIPTS_BUCKET: expenseiq-receipts

functions:
  api:
    handler: dist/lambda.handler
    events:
      - http:
          path: /
          method: ANY
          cors: true
      - http:
          path: /{proxy+}
          method: ANY
          cors: true

plugins:
  - serverless-dotenv-plugin
